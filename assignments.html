<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSG — Assignments</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;--black:#111111;
  --c-appearance:#d4a8c8;--c-autoperception:#e8c040;--c-desire:#c42030;
  --c-inheritance:#3a5a9e;--c-fear:#5c2a4a;--c-nerve:#2d8a3e;
  --c-mirroring:#c8a8c0;--c-traces:#6e1a3a;
  --sans:'Inter',sans-serif;--serif:'Lora',Georgia,serif;
}
html,body{height:100%;background:var(--white);color:var(--black);font-family:var(--sans);overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:var(--white);border-bottom:1px solid rgba(0,0,0,0.1)}
.nav-logo{font-family:var(--sans);font-size:14px;font-weight:600;letter-spacing:0.06em;color:var(--black);text-decoration:none;cursor:pointer}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-family:var(--sans);font-size:13px;font-weight:400;color:var(--black);text-decoration:none;transition:color .2s;letter-spacing:0.01em;cursor:pointer}
.nav-links a.active{color:rgba(0,0,0,0.32)}
.nav-links a:not(.active):hover{color:var(--black);opacity:.7}

/* ══ ASSIGNMENTS ══ */
#archive{padding-top:80px;min-height:100vh}
.archive-hero{padding:48px 56px 32px;border-bottom:1px solid rgba(0,0,0,0.1);position:relative}
.archive-bar{height:4px;position:absolute;top:0;left:0;right:0}
.archive-kicker{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:rgba(0,0,0,0.35);margin-bottom:8px}
.archive-title-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.archive-title{font-family:var(--serif);font-size:clamp(42px,5vw,70px);font-weight:400;line-height:1;letter-spacing:-0.02em}
.archive-count{font-family:var(--serif);font-style:italic;font-size:clamp(17px,1.5vw,22px);color:rgba(0,0,0,0.38)}

/* Topic filter tabs */
.topic-tabs{display:flex;gap:0;border-bottom:1px solid rgba(0,0,0,0.1);overflow-x:auto}
.topic-tab{font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:16px 24px;cursor:pointer;transition:all .2s;border-bottom:3px solid transparent;color:rgba(0,0,0,0.4);background:transparent;white-space:nowrap}
.topic-tab:hover{color:var(--black);background:rgba(0,0,0,0.02)}
.topic-tab.active{color:var(--black);border-bottom-color:var(--black)}

/* Assignments grid */
.assignments-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:32px 48px}
.assignment-card{padding:40px 32px 40px 48px;position:relative;cursor:pointer;transition:filter .2s,transform .2s;min-height:480px;display:flex;flex-direction:column;gap:12px;border-radius:4px}
.assignment-card:hover{filter:brightness(1.05);transform:translateY(-2px)}
.card-dots{display:flex;flex-direction:column;gap:11px;position:absolute;left:18px;top:88px;bottom:28px}
.card-dot{width:13px;height:13px;border-radius:2px;opacity:.55}
.card-number{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.card-num-icon{width:13px;height:13px;border-radius:2px;flex-shrink:0}
.card-title{font-family:var(--sans);font-size:20px;font-weight:500;line-height:1.25;margin-top:2px}
.card-desc{font-family:var(--serif);font-size:15px;line-height:1.55;opacity:.72;margin-top:4px}

/* Topic colors */
.assignment-card[data-topic="appearance"]{background:var(--c-appearance)}
.assignment-card[data-topic="autoperception"]{background:var(--c-autoperception)}
.assignment-card[data-topic="desire"]{background:var(--c-desire);color:#fff}
.assignment-card[data-topic="inheritance"]{background:var(--c-inheritance);color:#fff}
.assignment-card[data-topic="fear"]{background:var(--c-fear);color:#fff}
.assignment-card[data-topic="nerve"]{background:var(--c-nerve);color:#fff}
.assignment-card[data-topic="mirroring"]{background:var(--c-mirroring)}
.assignment-card[data-topic="traces"]{background:var(--c-traces);color:#fff}
.assignment-card[data-topic="desire"] .card-desc,
.assignment-card[data-topic="inheritance"] .card-desc,
.assignment-card[data-topic="fear"] .card-desc,
.assignment-card[data-topic="nerve"] .card-desc,
.assignment-card[data-topic="traces"] .card-desc{opacity:.78}

/* Color band */
.color-band{display:flex;height:8px;width:100%}
.color-band span{flex:1}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">TSG</a>
  <ul class="nav-links">
    <li><a id="nav-archive" href="assignments.html">Assignments</a></li>
    <li><a href="community.html">Community</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="terms.html">Terms</a></li>
  </ul>
</nav>

<!-- ════════ ASSIGNMENTS ════════ -->
<div id="archive">
  <div class="archive-hero">
    <div class="archive-bar"></div>
    <p class="archive-kicker">Assignments</p>
    <div class="archive-title-row">
      <h1 class="archive-title" id="archive-title">All Topics</h1>
      <span class="archive-count" id="archive-count"></span>
    </div>
  </div>
  <div class="topic-tabs" id="topic-tabs">
    <div class="topic-tab active" data-topic="all">All</div>
    <div class="topic-tab" data-topic="appearance">Appearance</div>
    <div class="topic-tab" data-topic="autoperception">Autoperception</div>
    <div class="topic-tab" data-topic="desire">Desire</div>
    <div class="topic-tab" data-topic="inheritance">Inheritance</div>
    <div class="topic-tab" data-topic="fear">Fear</div>
    <div class="topic-tab" data-topic="nerve">Nerve</div>
    <div class="topic-tab" data-topic="mirroring">Mirroring</div>
    <div class="topic-tab" data-topic="traces">Traces</div>
  </div>
  <div class="assignments-grid" id="assignments-grid"></div>
  <div class="color-band">
    <span style="background:var(--c-appearance)"></span>
    <span style="background:var(--c-autoperception)"></span>
    <span style="background:var(--c-desire)"></span>
    <span style="background:var(--c-inheritance)"></span>
    <span style="background:var(--c-fear)"></span>
    <span style="background:var(--c-nerve)"></span>
    <span style="background:var(--c-mirroring)"></span>
    <span style="background:var(--c-traces)"></span>
  </div>
  <div id="footer-container"></div>
</div>

<script>
const TOPICS = {
  appearance: { label: 'Appearance', assignments: [
    { id: 'appearance-01', title: 'Assignment 01', desc: 'Ask your family who you are' },
    { id: 'appearance-02', title: 'Assignment 02', desc: 'Describe yourself without using your body' },
    { id: 'appearance-03', title: 'Assignment 03', desc: 'Find a photograph you were never meant to see' },
    { id: 'appearance-04', title: 'Assignment 04', desc: 'Dress for someone who has never met you' },
    { id: 'appearance-05', title: 'Assignment 05', desc: 'Write a letter to your reflection' },
  ]},
  autoperception: { label: 'Autoperception', assignments: [
    { id: 'autoperception-01', title: 'Assignment 01', desc: 'Ask your family who you are' },
    { id: 'autoperception-02', title: 'Assignment 02', desc: 'Record yourself for one minute without speaking' },
    { id: 'autoperception-03', title: 'Assignment 03', desc: 'List five things you pretend to be' },
    { id: 'autoperception-04', title: 'Assignment 04', desc: 'Describe the version of you others see' },
  ]},
  desire: { label: 'Desire', assignments: [
    { id: 'desire-01', title: 'Assignment 01', desc: 'Ask your family who you are' },
    { id: 'desire-02', title: 'Assignment 02', desc: 'Name a want you have never spoken aloud' },
    { id: 'desire-03', title: 'Assignment 03', desc: 'Trace desire back to its origin' },
    { id: 'desire-04', title: 'Assignment 04', desc: 'Write about what you are afraid to want' },
    { id: 'desire-05', title: 'Assignment 05', desc: 'Find the desire that was never yours' },
    { id: 'desire-06', title: 'Assignment 06', desc: 'Map the people who shaped what you want' },
  ]},
  inheritance: { label: 'Inheritance', assignments: [
    { id: 'inheritance-01', title: 'Assignment 01', desc: 'Ask your family who you are' },
    { id: 'inheritance-02', title: 'Assignment 02', desc: 'Find a habit you did not choose' },
    { id: 'inheritance-03', title: 'Assignment 03', desc: 'Identify what was passed down in silence' },
    { id: 'inheritance-04', title: 'Assignment 04', desc: 'Name the story told before you were born' },
  ]},
  fear: { label: 'Fear', assignments: [
    { id: 'fear-01', title: 'Assignment 01', desc: 'Ask your family who you are' },
    { id: 'fear-02', title: 'Assignment 02', desc: 'Describe a fear that protects you' },
    { id: 'fear-03', title: 'Assignment 03', desc: 'Trace a fear to its first moment' },
    { id: 'fear-04', title: 'Assignment 04', desc: 'Write about what fear has cost you' },
    { id: 'fear-05', title: 'Assignment 05', desc: 'Find a fear that belongs to someone else' },
  ]},
  nerve: { label: 'Nerve', assignments: [
    { id: 'nerve-01', title: 'Assignment 01', desc: 'Ask your family who you are' },
    { id: 'nerve-02', title: 'Assignment 02', desc: 'Notice where courage lives in your body' },
    { id: 'nerve-03', title: 'Assignment 03', desc: 'Do one thing that makes you visible' },
  ]},
  mirroring: { label: 'Mirroring', assignments: [
    { id: 'mirroring-01', title: 'Assignment 01', desc: 'Ask your family who you are' },
    { id: 'mirroring-02', title: 'Assignment 02', desc: 'Find someone you have become' },
    { id: 'mirroring-03', title: 'Assignment 03', desc: 'Notice what you copy without knowing' },
    { id: 'mirroring-04', title: 'Assignment 04', desc: 'Write about who you see when you look at others' },
    { id: 'mirroring-05', title: 'Assignment 05', desc: 'Identify your mirrors and your blind spots' },
  ]},
  traces: { label: 'Traces', assignments: [
    { id: 'traces-01', title: 'Assignment 01', desc: 'Ask your family who you are' },
    { id: 'traces-02', title: 'Assignment 02', desc: 'Find evidence of who you used to be' },
    { id: 'traces-03', title: 'Assignment 03', desc: 'Collect the objects that remember for you' },
    { id: 'traces-04', title: 'Assignment 04', desc: 'Write about a trace you left by accident' },
  ]}
};

const DOT = {
  appearance:    'rgba(140,60,110,0.45)',
  autoperception:'rgba(120,70,0,0.4)',
  desire:        'rgba(255,255,255,0.45)',
  inheritance:   'rgba(255,255,255,0.45)',
  fear:          'rgba(255,255,255,0.4)',
  nerve:         'rgba(255,255,255,0.4)',
  mirroring:     'rgba(120,50,100,0.4)',
  traces:        'rgba(255,255,255,0.42)'
};

function cardHTML(a, key, idx, dot) {
  const dots = Array.from({length: 8}, () => `<div class="card-dot" style="background:${dot}"></div>`).join('');
  return `
    <div class="assignment-card" data-topic="${key}" onclick="window.location.href='assignment.html?topic=${key}&index=${idx}'">
      <div class="card-dots">${dots}</div>
      <div class="card-number"><div class="card-num-icon" style="background:${dot}"></div>${a.title}</div>
      <div class="card-title">${a.title}</div>
      <div class="card-desc">${a.desc}</div>
    </div>`;
}

function renderAssignments(topicKey) {
  const grid  = document.getElementById('assignments-grid');
  const bar   = document.querySelector('.archive-bar');
  const title = document.getElementById('archive-title');
  const count = document.getElementById('archive-count');

  if (topicKey === 'all') {
    title.textContent = 'All Assignments';
    count.textContent = '';
    bar.style.background = 'linear-gradient(to right,var(--c-appearance),var(--c-autoperception),var(--c-desire),var(--c-inheritance),var(--c-fear),var(--c-nerve),var(--c-mirroring),var(--c-traces))';
    let html = '';
    Object.keys(TOPICS).forEach(key => {
      const topic = TOPICS[key];
      const dot = DOT[key] || 'rgba(0,0,0,0.3)';
      html += `<div style="grid-column:1/-1;padding:32px 56px 12px;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:rgba(0,0,0,0.35)">${topic.label}</div>`;
      html += topic.assignments.map((a, idx) => cardHTML(a, key, idx, dot)).join('');
    });
    grid.innerHTML = html;
  } else {
    const topic = TOPICS[topicKey];
    title.textContent = topic.label;
    count.textContent = topic.assignments.length + ' assignment' + (topic.assignments.length > 1 ? 's' : '');
    bar.style.background = 'var(--c-' + topicKey + ')';
    const dot = DOT[topicKey] || 'rgba(0,0,0,0.3)';
    grid.innerHTML = topic.assignments.map((a, idx) => cardHTML(a, topicKey, idx, dot)).join('');
  }
}

document.getElementById('topic-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.topic-tab');
  if (!tab) return;
  document.querySelectorAll('.topic-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderAssignments(tab.dataset.topic);
});

document.getElementById('nav-archive').classList.add('active');

const hash = location.hash.replace('#', '');
if (TOPICS[hash]) {
  document.querySelectorAll('.topic-tab').forEach(t => t.classList.toggle('active', t.dataset.topic === hash));
  renderAssignments(hash);
} else {
  renderAssignments('all');
}
</script>
<script src="footer.js"></script>
</body>
</html>
